# Sample feeds. Copy to your config.json `feeds` array, or add with:
#   /rss-tracker add <url> --name "..." --category "..."

# ── Computer Science / AI ──────────────────────────────────
[[feeds]]
name = "arXiv cs.CL (NLP)"
url  = "http://export.arxiv.org/rss/cs.CL"
category = "cs"

[[feeds]]
name = "arXiv cs.LG (Machine Learning)"
url  = "http://export.arxiv.org/rss/cs.LG"
category = "cs"

# ── Medicine / Oncology ────────────────────────────────────
# (Cloudflare-protected; rss-tracker bypasses with browser headers)
[[feeds]]
name = "JCO (ASCO Pubs)"
url  = "https://ascopubs.org/action/showFeed?type=etoc&feed=rss&jc=jco"
category = "medicine"

[[feeds]]
name = "NEJM Hematology-Oncology"
url  = "https://onesearch-rss.nejm.org/api/specialty/rss?context=nejm&specialty=hematology-oncology"
category = "medicine"

